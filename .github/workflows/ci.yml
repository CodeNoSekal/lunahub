name: ci

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
      - name: Format check
        run: |
          test -z "$(gofmt -l ./cmd)"
      - name: Go test
        run: go test ./...
      - name: Build
        run: go build -o /tmp/lunahub ./cmd/lunahub
      - name: Shell syntax
        run: |
          bash -n install.sh
          bash -n scripts/uninstall.sh
          bash -n scripts/dev-check.sh
